name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    # Requires a self-hosted runner with NVIDIA GPU + CUDA runtime/toolkit.
    # Adjust labels to match your runner registration.
    runs-on: [self-hosted, linux, x64, gpu, cuda]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --extra dev --extra benchmark

      - name: CUDA preflight
        run: |
          nvidia-smi
          uv run python - <<'PY'
          import torch
          assert torch.cuda.is_available(), "CUDA is not available on this runner."
          print("CUDA device count:", torch.cuda.device_count())
          print("CUDA device 0:", torch.cuda.get_device_name(0))
          PY

      - name: Run test suite (full regression/stress matrices)
        run: uv run pytest testing --run-regression --run-stress --full-matrix -q
